{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Sistema de Inscripciones</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="brand-icon">
          <i class="bi bi-mortarboard-fill"></i>
        </div>

        <h3 class="login-title">Sistema de Inscripciones</h3>
        <p class="text-center text-muted mb-4" style="font-weight: 500;">U.E. Jesus Maria</p>

        <form method="post">
          {% csrf_token %}

          <div class="form-group mb-3">
            {{ form.username.label_tag }}
            <div class="input-wrapper">
              <i class="bi bi-person text-muted"></i>
              {{ form.username }}
            </div>
          </div>

          <div class="form-group mb-4">
            {{ form.password.label_tag }}
            <div class="input-wrapper">
              <i class="bi bi-lock text-muted"></i>
              {{ form.password }}
              <i class="bi bi-eye-slash text-muted" id="togglePassword" style="cursor: pointer; left: auto; right: 15px;"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-login">Iniciar sesión <i class="bi bi-box-arrow-in-right ms-1"></i></button>
        </form>
      </div>
    </div>

    <script src="{% static 'accounts/js/login.js' %}"></script>
  </body>
</html>
